# ============================================================
# Spring AI Agent — Application Properties
# ============================================================

spring.application.name=spring-ai-agent
server.port=8080

# ── Anthropic (Claude) ──────────────────────────────────────
# Set your API key here or via environment variable SPRING_AI_ANTHROPIC_API_KEY
spring.ai.anthropic.api-key=${SPRING_AI_ANTHROPIC_API_KEY:your-api-key-here}
spring.ai.anthropic.chat.options.model=claude-opus-4-8
spring.ai.anthropic.chat.options.max-tokens=4096
spring.ai.anthropic.chat.options.temperature=0.7

# ── Spring AI — OpenAI ──────────────────────────────────────
# Endpoints: /api/springai/openai/*
# Set env var: OPENAI_API_KEY
spring.ai.openai.api-key=${OPENAI_API_KEY:your-openai-api-key-here}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7

# ── Spring AI — Ollama (local, no API key needed) ───────────
# Endpoints: /api/springai/ollama/*
# Install Ollama: https://ollama.ai  then run: ollama pull llama3.2
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=llama3.2

# ── Spring AI — Mistral AI ──────────────────────────────────
# Endpoints: /api/springai/mistral/*
# Set env var: MISTRAL_API_KEY
spring.ai.mistralai.api-key=${MISTRAL_API_KEY:your-mistral-api-key-here}
spring.ai.mistralai.chat.options.model=mistral-small-latest
spring.ai.mistralai.chat.options.temperature=0.7

# ── LangChain4j — OpenAI ────────────────────────────────────
# Endpoints: /api/langchain4j/openai/*
# Reads the same OPENAI_API_KEY env var as Spring AI OpenAI
langchain4j.openai.api-key=${OPENAI_API_KEY:your-openai-api-key-here}
langchain4j.openai.model-name=gpt-4o-mini

# ── LangChain4j — Anthropic ─────────────────────────────────
# Endpoints: /api/langchain4j/anthropic/*
# Reuses the same SPRING_AI_ANTHROPIC_API_KEY as the existing Anthropic setup
langchain4j.anthropic.api-key=${SPRING_AI_ANTHROPIC_API_KEY:your-anthropic-key-here}
langchain4j.anthropic.model-name=claude-3-haiku-20240307

# ── LangChain4j — Ollama ────────────────────────────────────
# Endpoints: /api/langchain4j/ollama/*
# No API key — requires Ollama running locally
langchain4j.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
langchain4j.ollama.model-name=llama3.2

# ── LangChain4j — Google Gemini ─────────────────────────────
# Endpoints: /api/langchain4j/gemini/*
# Free API key: https://aistudio.google.com  Set env var: GEMINI_API_KEY
langchain4j.gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
langchain4j.gemini.model-name=gemini-1.5-flash

# ── LangChain4j — Mistral AI ────────────────────────────────
# Endpoints: /api/langchain4j/mistral/*
# Reads the same MISTRAL_API_KEY env var as Spring AI Mistral
langchain4j.mistral.api-key=${MISTRAL_API_KEY:your-mistral-api-key-here}
langchain4j.mistral.model-name=mistral-small-latest

# ── Logging ─────────────────────────────────────────────────
logging.level.org.springframework.ai=DEBUG
