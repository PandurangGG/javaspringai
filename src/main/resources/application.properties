# ============================================================
# Spring AI Agent — Application Properties
# ============================================================

spring.application.name=spring-ai-agent
server.port=8080

# ── Anthropic (Claude) ──────────────────────────────────────
# Set your API key here or via environment variable SPRING_AI_ANTHROPIC_API_KEY
spring.ai.anthropic.api-key=${SPRING_AI_ANTHROPIC_API_KEY:your-api-key-here}
spring.ai.anthropic.chat.options.model=claude-opus-4-8
spring.ai.anthropic.chat.options.max-tokens=4096
spring.ai.anthropic.chat.options.temperature=0.7

# ── Optional: OpenAI (uncomment to use OpenAI instead) ──────
# spring.ai.openai.api-key=${OPENAI_API_KEY:your-openai-key-here}
# spring.ai.openai.chat.options.model=gpt-4o
# spring.ai.openai.chat.options.temperature=0.7

# ── Logging ─────────────────────────────────────────────────
logging.level.org.springframework.ai=DEBUG
