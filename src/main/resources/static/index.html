<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Java AI Playground</title>
<style>
:root{--bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#30363d;--bd:#30363d;--tx:#e6edf3;--t2:#8b949e;--t3:#6e7681;--ac:#58a6ff;--gr:#3fb950;--pu:#bc8cff;--or:#ffa657;--re:#f85149;--ye:#d29922;--pi:#ff7b72;--sw:248px;--hh:52px}
[data-theme=light]{--bg:#fff;--s1:#f6f8fa;--s2:#eaeef2;--s3:#d0d7de;--bd:#d0d7de;--tx:#1f2328;--t2:#636c76;--t3:#8c959f;--ac:#0969da;--gr:#1a7f37;--pu:#8250df;--or:#bc4c00;--re:#d1242f;--ye:#9a6700;--pi:#cf222e}
*{box-sizing:border-box;margin:0;padding:0}html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);height:100%;display:flex;flex-direction:column;overflow:hidden}
/* TOPBAR */
#topbar{height:var(--hh);background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:12px;flex-shrink:0;z-index:50}
.brand{font-weight:700;font-size:15px;color:var(--ac);white-space:nowrap}.tb-mid{flex:1;text-align:center;font-size:13px;color:var(--t2);font-weight:500}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto}
/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
#sidebar{width:var(--sw);background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;flex-shrink:0}
#sidebar.closed{width:0}
.nav-search{width:100%;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:7px 10px;border-radius:6px;font-size:12px;outline:none}
.nav-search:focus{border-color:var(--ac)}
.nav-search-wrap{padding:10px}
.nav-group{margin-bottom:4px}
.nav-group-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);padding:6px 12px 3px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:13px;color:var(--t2);cursor:pointer;border-radius:0;transition:background .15s;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:var(--s2);color:var(--tx)}
.nav-item.active{background:rgba(88,166,255,.12);color:var(--ac);font-weight:600}
.nav-tree{overflow-y:auto;flex:1;padding-bottom:12px}
/* SIDEBAR FILTER TABS */
.sb-filters{display:flex;gap:3px;padding:0 10px 8px;border-bottom:1px solid var(--bd);margin-bottom:2px}
.sb-ftab{flex:1;background:transparent;border:1px solid var(--bd);color:var(--t2);padding:4px 0;border-radius:5px;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.3px;transition:all .15s;text-align:center}
.sb-ftab:hover{color:var(--tx);background:var(--s2)}
.sb-ftab.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.sb-ftab.on.free{background:var(--gr);border-color:var(--gr)}
/* SIDEBAR BADGES */
.nb{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:auto;flex-shrink:0;letter-spacing:.3px}
.nb-free{background:rgba(63,185,80,.2);color:var(--gr)}
.nb-key{background:rgba(210,153,34,.15);color:var(--ye)}
/* KEY PILL on page */
.key-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600}
.key-paid{background:rgba(255,166,87,.12);color:var(--or);border:1px solid rgba(255,166,87,.3)}
.key-free{background:rgba(63,185,80,.12);color:var(--gr);border:1px solid rgba(63,185,80,.3)}
.key-local{background:rgba(188,140,255,.12);color:var(--pu);border:1px solid rgba(188,140,255,.3)}
/* MAIN */
#main{flex:1;overflow-y:auto;padding:24px;background:var(--bg)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--ac);color:#fff}.btn-primary:hover{opacity:.88}
.btn-secondary{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}.btn-secondary:hover{background:var(--s3)}
.btn-danger{background:var(--re);color:#fff}.btn-danger:hover{opacity:.88}
.btn-green{background:var(--gr);color:#fff}.btn-green:hover{opacity:.88}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.icon-btn{background:transparent;border:1px solid var(--bd);color:var(--t2);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:14px;transition:all .15s}
.icon-btn:hover{background:var(--s2);color:var(--tx)}
/* INPUTS */
.inp{width:100%;background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:9px 12px;border-radius:7px;font-size:13px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--ac)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;font-family:inherit;line-height:1.5}
select.inp{cursor:pointer}
.inp-group{margin-bottom:12px}
.inp-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block}
.inp-row{display:grid;gap:10px}
/* CARDS */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:20px}
.card+.card{margin-top:14px}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
/* PAGE */
.page-header{margin-bottom:20px}
.page-title{font-size:20px;font-weight:800;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--t2)}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - var(--hh) - 48px - 80px);min-height:300px}
.chat-messages{flex:1;overflow-y:auto;padding:12px 0;display:flex;flex-direction:column;gap:12px}
.bubble{max-width:82%;padding:11px 14px;border-radius:12px;font-size:13px;line-height:1.55;word-break:break-word}
.bubble-user{align-self:flex-end;background:var(--ac);color:#fff;border-bottom-right-radius:3px}
.bubble-ai{align-self:flex-start;background:var(--s2);color:var(--tx);border-bottom-left-radius:3px}
.bubble-ai pre{background:var(--s3);border-radius:6px;padding:10px;margin-top:8px;overflow-x:auto;font-size:12px;white-space:pre-wrap}
.bubble-meta{font-size:10px;opacity:.6;margin-top:5px}
.bubble-error{align-self:flex-start;background:rgba(248,81,73,.12);color:var(--re);border:1px solid rgba(248,81,73,.3);border-bottom-left-radius:3px}
.chat-input-area{padding-top:12px;border-top:1px solid var(--bd);display:flex;gap:8px;align-items:flex-end}
.chat-input-area textarea{flex:1;min-height:44px;max-height:120px;resize:none}
/* STREAM */
.stream-box{background:#0d1117;border:1px solid var(--bd);border-radius:8px;padding:14px;min-height:120px;max-height:420px;overflow-y:auto;font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.65;color:#e6edf3;white-space:pre-wrap;word-break:break-word}
.cursor{display:inline-block;width:7px;height:13px;background:var(--ac);animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{50%{opacity:0}}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.b-blue{background:rgba(88,166,255,.15);color:var(--ac)}
.b-green{background:rgba(63,185,80,.15);color:var(--gr)}
.b-purple{background:rgba(188,140,255,.15);color:var(--pu)}
.b-orange{background:rgba(255,166,87,.15);color:var(--or)}
.b-red{background:rgba(248,81,73,.15);color:var(--re)}
.b-yellow{background:rgba(210,153,34,.15);color:var(--ye)}
/* TABS */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--bd);margin-bottom:18px;flex-wrap:wrap}
.tab{background:transparent;border:none;color:var(--t2);padding:8px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-weight:500}
.tab:hover{color:var(--tx)}.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.tab-panel{display:none}.tab-panel.on{display:block}
/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
/* RESPONSE */
.resp-box{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-top:12px;font-size:13px;line-height:1.6;position:relative}
.resp-box pre{white-space:pre-wrap;word-break:break-word;font-family:'SF Mono','Fira Code',monospace;font-size:12px}
.resp-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.copy-btn-abs{position:absolute;top:10px;right:10px}
/* STATUS DOTS */
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;background:var(--t3)}
.dot.ok{background:var(--gr)}.dot.err{background:var(--re)}.dot.chk{background:var(--ye);animation:pulse-dot 1s ease infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
/* DASHBOARD GRID */
.provider-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.pcard{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px;transition:transform .15s}
.pcard:hover{transform:translateY(-2px)}
.pcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pcard-name{font-weight:700;font-size:14px}
.pcard-route{font-family:monospace;font-size:11px;color:var(--t2);margin-bottom:10px}
/* COMPARISON */
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:16px}
.cmp-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px}
.cmp-card-header{font-weight:700;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
/* LOADING */
.spinner{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:8px;color:var(--t2);font-size:13px;padding:8px 0}
/* TOAST */
#toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:slide-in .2s ease}
@keyframes slide-in{from{transform:translateX(100%);opacity:0}}
.toast.ok{border-left:3px solid var(--gr)}.toast.err{border-left:3px solid var(--re)}.toast.info{border-left:3px solid var(--ac)}
/* MISC */
.sep{border:none;border-top:1px solid var(--bd);margin:16px 0}
.code{font-family:monospace;font-size:12px;background:var(--s2);padding:2px 6px;border-radius:4px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
@media(max-width:700px){.grid-2,.grid-3{grid-template-columns:1fr}#sidebar{position:fixed;height:100%;z-index:40;top:var(--hh)}#sidebar.closed{transform:translateX(-100%);width:var(--sw)}}
</style>
</head>
<body>

<div id="app" style="display:flex;flex-direction:column;height:100vh">
<header id="topbar">
  <button class="icon-btn" id="sb-toggle" title="Toggle sidebar">☰</button>
  <span class="brand">☕ Java AI Playground</span>
  <div class="tb-mid" id="page-title">Dashboard</div>
  <div class="tb-right">
    <div style="display:flex;align-items:center;gap:4px" title="Spring Boot base URL">
      <span id="app-dot" class="dot chk" title="Checking..."></span>
      <input id="base-url-inp" style="background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:4px 8px;border-radius:6px;font-size:11px;width:190px;font-family:monospace;outline:none" placeholder="http://localhost:8080" value="http://localhost:8080">
      <button class="icon-btn" style="font-size:11px;padding:4px 8px" onclick="setBase(document.getElementById('base-url-inp').value)">Connect</button>
    </div>
    <a id="swagger-link" href="http://localhost:8080/swagger-ui/index.html" target="_blank" class="icon-btn" style="text-decoration:none;font-size:12px">Swagger ↗</a>
    <button class="icon-btn" id="theme-btn">🌙</button>
  </div>
</header>

<div id="layout" style="display:flex;flex:1;overflow:hidden">
  <nav id="sidebar">
    <div class="nav-search-wrap"><input class="nav-search" id="nav-search" placeholder="🔍 Search..."></div>
    <div class="nav-tree" id="nav-tree"></div>
  </nav>
  <main id="main" style="flex:1;overflow-y:auto;padding:24px"></main>
</div>
</div>

<div id="toasts"></div>

<script>
'use strict';

/* ── CONFIG ── */
// Use relative URLs when served by Spring Boot; fall back to absolute when opened from file://
let BASE = (window.location.protocol === 'file:')
  ? (localStorage.getItem('playground_base') || 'http://localhost:8080')
  : '';

function setBase(url) {
  BASE = url.replace(/\/$/, '');
  localStorage.setItem('playground_base', BASE);
  const inp = document.getElementById('base-url-inp');
  if (inp) inp.value = BASE;
  checkAppHealth();
  toast('Base URL updated to ' + BASE, 'ok');
}

/* ── STATE ── */
const S = {
  page: 'dashboard',
  theme: localStorage.getItem('th') || 'dark',
  chats: {}, // pageId -> [{role,content,meta}]
  streamActive: false,
};

/* ── NAV ── */
// free:true  = no API key needed
// key:'NAME' = which env var is required
const NAV = [
  {id:'dashboard',  label:'📊 Dashboard',           free:true},
  {id:'free-apis',  label:'🆓 No API Key Required',  free:true},
  {group:'🌱 Spring AI — Anthropic (Core)', items:[
    {id:'agent-chat',   label:'💬 Agent Chat',          key:'ANTHROPIC'},
    {id:'stream-chat',  label:'🌊 Stream Chat',          key:'ANTHROPIC'},
    {id:'structured',   label:'📊 Structured Output',    key:'ANTHROPIC'},
    {id:'templates',    label:'📝 Templates',             key:'ANTHROPIC'},
    {id:'vision',       label:'👁️ Vision / Multimodal',  key:'ANTHROPIC'},
    {id:'tools',        label:'🔧 Tools Playground',     free:true},
    {id:'model-config', label:'⚙️ Model Config',         key:'ANTHROPIC'},
    {id:'memory',       label:'🧠 Conversation Memory',  key:'ANTHROPIC'},
    {id:'output-conv',  label:'🔄 Output Converters',    key:'ANTHROPIC'},
  ]},
  {group:'⚡ Spring AI — More Providers', items:[
    {id:'sai-openai',  label:'🤖 OpenAI',        key:'OPENAI'},
    {id:'sai-ollama',  label:'🦙 Ollama (Local)', free:true},
    {id:'sai-mistral', label:'🌊 Mistral AI',     key:'MISTRAL'},
  ]},
  {group:'⛓️ LangChain4j', items:[
    {id:'lc4j-openai',    label:'🤖 OpenAI',        key:'OPENAI'},
    {id:'lc4j-anthropic', label:'🧠 Anthropic',     key:'ANTHROPIC'},
    {id:'lc4j-ollama',    label:'🦙 Ollama (Local)', free:true},
    {id:'lc4j-gemini',    label:'💎 Google Gemini',  key:'GEMINI'},
    {id:'lc4j-mistral',   label:'🌊 Mistral AI',    key:'MISTRAL'},
  ]},
  {id:'comparison', label:'🔀 Compare Providers'},
];

/* ── UTILITIES ── */
const $  = (s,p=document) => p.querySelector(s);
const $$ = (s,p=document) => [...p.querySelectorAll(s)];
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt = v => typeof v==='object' ? JSON.stringify(v,null,2) : String(v);
const uid = () => Math.random().toString(36).slice(2,8);

function toast(msg, type='info', dur=3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='ok'?'✓':type==='err'?'✗':'ℹ'}</span><span>${esc(msg)}</span>`;
  $('#toasts').appendChild(el);
  setTimeout(()=>el.remove(), dur);
}

function copyText(txt) {
  navigator.clipboard.writeText(txt).then(()=>toast('Copied!','ok')).catch(()=>{});
}

function prettyJson(v) {
  const s = fmt(v);
  return s.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
    let cls='color:var(--or)';
    if(/^"/.test(m)){cls=/:$/.test(m)?'color:var(--ac)':'color:var(--gr)'}
    else if(/true|false/.test(m)){cls='color:var(--pu)'}
    else if(/null/.test(m)){cls='color:var(--re)'}
    return `<span style="${cls}">${m}</span>`;
  });
}

/* ── API ── */
async function apiPost(path, body) {
  let r;
  try { r = await fetch(BASE+path, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)}); }
  catch(e) { throw new Error('Cannot reach ' + BASE + path + ' — is the app running? (' + e.message + ')'); }
  if(!r.ok) { const t=await r.text().catch(()=>''); throw new Error(r.status + ' ' + r.statusText + (t?' — '+t.slice(0,180):'')); }
  return r.json();
}
async function apiGet(path) {
  let r;
  try { r = await fetch(BASE+path); }
  catch(e) { throw new Error('Cannot reach ' + BASE + path + ' — is the app running? (' + e.message + ')'); }
  if(!r.ok) { const t=await r.text().catch(()=>''); throw new Error(r.status + ' ' + r.statusText + (t?' — '+t.slice(0,120):'')); }
  return r.json();
}
async function apiDel(path) {
  const r = await fetch(BASE+path, {method:'DELETE'});
  if(!r.ok) throw new Error(r.statusText);
  return r.json();
}
async function apiStream(path, body, onToken, onDone, onErr) {
  try {
    let r;
    try { r = await fetch(BASE+path, {method:'POST', headers:{'Content-Type':'application/json','Accept':'text/event-stream'}, body:JSON.stringify(body)}); }
    catch(e) { return onErr(new Error('Cannot reach ' + BASE + path + ' (' + e.message + ')')); }
    if(!r.ok){const t=await r.text().catch(()=>'');return onErr(new Error(r.status+' '+r.statusText+(t?' — '+t.slice(0,120):''))); }
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while(true) {
      const {done,value} = await reader.read();
      if(done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split('\n');
      buf = lines.pop();
      for(const line of lines) {
        if(line.startsWith('data:')) {
          const d = line.slice(5).trim();
          if(d && d!=='[DONE]') onToken(d);
        }
      }
    }
    if(buf.startsWith('data:')) { const d=buf.slice(5).trim(); if(d&&d!=='[DONE]') onToken(d); }
    onDone();
  } catch(e){ onErr(e); }
}

/* ── SHARED COMPONENTS ── */
function respBox(data, metaBadges=[]) {
  const id = 'r'+uid();
  const txt = fmt(data);
  return `<div class="resp-box" id="${id}">
    ${metaBadges.length?`<div class="resp-meta">${metaBadges.join('')}</div>`:''}
    <button class="icon-btn btn-sm copy-btn-abs" onclick="copyText(document.getElementById('${id}').dataset.raw)">Copy</button>
    <pre><code>${prettyJson(data)}</code></pre>
  </div><script>document.getElementById('${id}').dataset.raw=${JSON.stringify(txt)};<\/script>`;
}

function badge(txt,cls='b-blue'){return `<span class="badge ${cls}">${esc(txt)}</span>`;}

function chatHtml(msgs) {
  if(!msgs||!msgs.length) return '<div style="text-align:center;color:var(--t3);padding:40px;font-size:13px">Send a message to start chatting</div>';
  return msgs.map(m => {
    const isBubble = m.role==='user'||m.role==='ai';
    const cls = m.role==='user'?'bubble-user':m.role==='error'?'bubble-error':'bubble-ai';
    const meta = m.meta ? `<div class="bubble-meta">${Object.values(m.meta).filter(Boolean).join(' · ')}</div>` : '';
    return `<div class="bubble ${cls}">${esc(m.content)}${meta}</div>`;
  }).join('');
}

function streamBox(id) {
  return `<div class="stream-box" id="${id}"><span class="cursor"></span></div>`;
}

function tabBar(tabs, active, prefix) {
  return `<div class="tabs">${tabs.map((t,i)=>`<button class="tab${i===active?' on':''}" onclick="switchTab('${prefix}',${i})">${t}</button>`).join('')}</div>`;
}

function switchTab(prefix, idx) {
  $$(`[data-tabs="${prefix}"] .tab`).forEach((t,i)=>t.classList.toggle('on',i===idx));
  $$(`[data-panel="${prefix}"]`).forEach((p,i)=>p.classList.toggle('on',i===idx));
}

function setupTabs(el) {
  // tabs already set up via onclick; just ensure first panel visible
}

/* ── CHAT PAGE BUILDER ── */
function buildChatPage(pageId, apiPath, metaFn, title, subtitle, extraFields='') {
  if(!S.chats[pageId]) S.chats[pageId]=[];
  return {
    html: `
      <div class="page-header"><div class="page-title">${title}</div><div class="page-sub">${subtitle}</div></div>
      <div class="chat-wrap">
        <div class="chat-messages" id="cm-${pageId}">${chatHtml(S.chats[pageId])}</div>
        ${extraFields}
        <div class="chat-input-area">
          <textarea class="inp" id="ci-${pageId}" placeholder="Type a message… (Shift+Enter for newline)" rows="2"></textarea>
          <div style="display:flex;flex-direction:column;gap:6px">
            <button class="btn btn-primary" id="cs-${pageId}">Send</button>
            <button class="btn btn-secondary btn-sm" onclick="clearChat('${pageId}')">Clear</button>
          </div>
        </div>
      </div>`,
    init() {
      const btn = $(`#cs-${pageId}`), inp = $(`#ci-${pageId}`);
      const send = async () => {
        const msg = inp.value.trim(); if(!msg) return;
        inp.value=''; btn.disabled=true;
        S.chats[pageId].push({role:'user',content:msg});
        renderChat(pageId);
        try {
          const body = typeof apiPath==='function' ? apiPath(msg) : {message:msg};
          const path = typeof apiPath==='string' ? apiPath : apiPath.path||apiPath;
          const data = await apiPost(path, body);
          const content = data.response||data.translation||data.result||data.explanation||data.email||data.tests||data.analysis||data.description||data.comparison||data.extractedText||JSON.stringify(data);
          const meta = metaFn ? metaFn(data) : null;
          S.chats[pageId].push({role:'ai',content,meta});
        } catch(e){ S.chats[pageId].push({role:'error',content:'Error: '+e.message}); toast(e.message,'err'); }
        btn.disabled=false;
        renderChat(pageId);
      };
      btn.onclick=send;
      inp.onkeydown=e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} };
      scrollChat(pageId);
    }
  };
}

function renderChat(id) {
  const el=$(`#cm-${id}`); if(!el) return;
  el.innerHTML=chatHtml(S.chats[id]);
  scrollChat(id);
}
function scrollChat(id) { const el=$(`#cm-${id}`); if(el) el.scrollTop=el.scrollHeight; }
function clearChat(id) { S.chats[id]=[]; renderChat(id); }

async function pingOne(i) {
  const p = PROVIDERS[i]; if(p.noGet) return;
  const dot = $(`#pd-${i}`); dot.className='dot chk';
  try { await apiGet(p.route); dot.className='dot ok'; toast(p.name+' is up','ok',1500); }
  catch(e){ dot.className='dot err'; toast(p.name+' error: '+e.message,'err'); }
}
async function pingAll() {
  const summary=$('#ping-summary'); if(summary) summary.textContent='Checking…';
  let ok=0,err=0;
  await Promise.all(PROVIDERS.map(async(p,i)=>{
    if(p.noGet){$(`#pd-${i}`).className='dot';return;}
    try{ await pingOne(i); ok++; } catch(e){ err++; }
  }));
  if(summary) summary.textContent=`${ok} up · ${err} errors`;
}

const pageMemory = {
  html: `
    <div class="page-header"><div class="page-title">🧠 Conversation Memory</div><div class="page-sub">Each session keeps its own history — AI remembers across turns</div></div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <div style="display:flex;gap:6px;align-items:center">
        <label class="inp-label" style="white-space:nowrap;margin:0">Session ID:</label>
        <input class="inp" id="mem-sid" value="session-1" style="width:140px">
      </div>
      <button class="btn btn-secondary btn-sm" onclick="memNewSession()">+ New Session</button>
      <button class="btn btn-danger btn-sm" id="mem-clr">Clear Session</button>
      <button class="btn btn-secondary btn-sm" id="mem-list">List Sessions</button>
    </div>
    <div id="mem-sessions-out" style="display:none;margin-bottom:12px"></div>
    <div class="chat-wrap">
      <div class="chat-messages" id="cm-memory"></div>
      <div class="chat-input-area">
        <textarea class="inp" id="ci-memory" placeholder="Say something… the AI will remember" rows="2"></textarea>
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="btn btn-primary" id="mem-send">Send</button>
        </div>
      </div>
    </div>`,
  init() {
    if(!S.chats['memory']) S.chats['memory']={};
    const getSession=()=>$('#mem-sid').value.trim()||'session-1';
    const getMsgs=()=>S.chats['memory'][getSession()]||[];
    const setMsgs=m=>{ S.chats['memory'][getSession()]=m; };

    const renderMem=()=>{ const el=$('#cm-memory'); if(el) el.innerHTML=chatHtml(getMsgs()); scrollChat('memory'); };

    $('#mem-sid').oninput=renderMem;
    renderMem();

    const send=async()=>{
      const msg=$('#ci-memory').value.trim(); if(!msg) return;
      const sid=getSession();
      $('#ci-memory').value=''; $('#mem-send').disabled=true;
      const msgs=getMsgs(); msgs.push({role:'user',content:msg}); setMsgs(msgs); renderMem();
      try {
        const d=await apiPost('/api/conversation/'+sid+'/chat',{message:msg});
        const resp=d.response||JSON.stringify(d);
        msgs.push({role:'ai',content:resp,meta:{session:sid}}); setMsgs(msgs);

      $('#mem-send').disabled=false; renderMem();

    $('#ci-memory').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};

      try { await apiDel('/api/conversation/'+getSession()); delete S.chats['memory'][getSession()]; renderMem(); toast('Session cleared','ok'); }
      catch(e){toast(e.message,'err');}
    };

      try { const d=await apiGet('/api/conversation/sessions'); const out=$('#mem-sessions-out'); out.style.display='block'; out.innerHTML=respBox(d,[badge('Active Sessions','b-blue')]); }
      catch(e){toast(e.message,'err');}
    };
  }

function buildProviderPage({id, title, subtitle, lib, libBadge, mainPath, streamPath, extraTabs=[]}) {
  const hasStream = !!streamPath;
  const allTabs = ['💬 Basic Chat', ...(hasStream?['🌊 Stream']:[] ), ...extraTabs.map(t=>t.label)];

  return {
    html: `
      <div class="page-header"><div class="page-title">${title}</div><div class="page-sub">${subtitle}</div></div>
      <div class="tabs">
        ${allTabs.map((t,i)=>`<button class="tab ${i===0?'on':''}" onclick="switchTab('${id}',${i})">${t}</button>`).join('')}
      </div>

      <!-- Basic Chat -->
      <div data-panel="${id}" class="tab-panel on">
        ${(() => { if(!S.chats[id]) S.chats[id]=[]; return ''; })()}
        <div class="chat-wrap">
          <div class="chat-messages" id="cm-${id}">${chatHtml(S.chats[id])}</div>
          <div class="chat-input-area">
            <textarea class="inp" id="ci-${id}" placeholder="Type a message…" rows="2"></textarea>
            <div style="display:flex;flex-direction:column;gap:6px">
              <button class="btn btn-primary" id="cs-${id}">Send</button>
              <button class="btn btn-secondary btn-sm" onclick="clearChat('${id}')">Clear</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Stream -->
      ${hasStream ? `<div data-panel="${id}" class="tab-panel">
        <div class="inp-group"><label class="inp-label">Message</label><textarea class="inp" id="ss-${id}" rows="3" placeholder="Type a message to stream…">Tell me about the history of artificial intelligence in 3 paragraphs.</textarea></div>
        <button class="btn btn-primary" id="sb-${id}">▶ Stream</button>
        <div style="margin-top:12px">${streamBox('so-'+id)}</div>
      </div>` : ''}

      <!-- Extra tabs -->
      ${extraTabs.map(t=>t.html(id)).join('')}
    `,
    init() {
      // Basic chat
      const btn=$(`#cs-${id}`), inp=$(`#ci-${id}`);
      const send=async()=>{
        const msg=inp.value.trim(); if(!msg) return;
        inp.value=''; btn.disabled=true;
        S.chats[id].push({role:'user',content:msg}); renderChat(id);
        try {
          const d=await apiPost(mainPath,{message:msg});
          const content=d.response||d.result||JSON.stringify(d);
          S.chats[id].push({role:'ai',content,meta:{library:d.library||lib,provider:d.provider||'',model:d.model||''}});
        } catch(e){ S.chats[id].push({role:'error',content:'Error: '+e.message}); toast(e.message,'err'); }
        btn.disabled=false; renderChat(id);
      };
      btn.onclick=send;
      inp.onkeydown=e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} };
      scrollChat(id);

      // Stream
      if(hasStream) setupStream('sb-'+id,'ss-'+id,'so-'+id,streamPath,m=>({message:m}));

      // Extra tab inits
      extraTabs.forEach(t=>t.init&&t.init(id));
    }
  };
}

/* ── LANGCHAIN4J PROVIDER PAGES ── */
function lc4jExtraTabs(id, aiPath, memorySuffix, extraOpts=[]) {
  return [
    {
      label:'🤖 AiServices',
      html:xid=>`<div data-panel="${xid}" class="tab-panel">
        <div style="background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px;font-size:12px;color:var(--t2);margin-bottom:12px">LangChain4j AiServices: annotated Java interface proxy with @SystemMessage + @UserMessage</div>
        <div class="inp-group"><label class="inp-label">Message</label><textarea class="inp" id="${xid}-ai-msg" rows="3">What are the key principles of clean code?</textarea></div>
        <button class="btn btn-primary" id="${xid}-ai-btn">Send via AiServices</button>
        <div id="${xid}-ai-out"></div>
      </div>`,
      init:xid=>{ $('#'+xid+'-ai-btn').onclick=async()=>{
        const btn=$('#'+xid+'-ai-btn'); btn.disabled=true;
        try { const d=await apiPost(aiPath,{message:$('#'+xid+'-ai-msg').value}); $('#'+xid+'-ai-out').innerHTML=respBox(d,[badge('LangChain4j','b-purple'),badge('AiServices','b-blue')]); }
        catch(e){toast(e.message,'err');} btn.disabled=false;
      };}
    },
    ...extraOpts,
    {
      label:'🧠 Memory Chat',
      html:xid=>`<div data-panel="${xid}" class="tab-panel">
        <div class="inp-group" style="display:flex;gap:8px;align-items:flex-end">
          <div style="flex:1"><label class="inp-label">Session ID</label><input class="inp" id="${xid}-mc-sid" value="${xid}-session-1"></div>
          <button class="btn btn-secondary btn-sm" onclick="document.getElementById('${xid}-mc-sid').value='${xid}-'+Math.random().toString(36).slice(2,6)">New</button>
        </div>
        <div class="chat-wrap" style="height:300px">
          <div class="chat-messages" id="cm-${xid}-mc"></div>
          <div class="chat-input-area">
            <textarea class="inp" id="ci-${xid}-mc" placeholder="AI remembers within session" rows="2"></textarea>
            <button class="btn btn-primary" id="cs-${xid}-mc">Send</button>
          </div>
        </div>
      </div>`,
      init:xid=>{
        const k=xid+'-mc'; if(!S.chats[k]) S.chats[k]={};
        const getMsgs=()=>S.chats[k][$('#'+xid+'-mc-sid').value]||[];
        const setMsgs=m=>{ S.chats[k][$('#'+xid+'-mc-sid').value]=m; };
        const renderMcm=()=>{ const el=$('#cm-'+xid+'-mc'); if(el){el.innerHTML=chatHtml(getMsgs());el.scrollTop=el.scrollHeight;} };
        const send=async()=>{
          const msg=$('#ci-'+xid+'-mc').value.trim(); if(!msg) return;
          const sid=$('#'+xid+'-mc-sid').value;
          $('#ci-'+xid+'-mc').value=''; $(`#cs-${xid}-mc`).disabled=true;
          const msgs=getMsgs(); msgs.push({role:'user',content:msg}); setMsgs(msgs); renderMcm();
          try {
            const d=await apiPost(memorySuffix,{sessionId:sid,message:msg});
            msgs.push({role:'ai',content:d.response||JSON.stringify(d),meta:{library:'LangChain4j',session:sid}}); setMsgs(msgs);
          } catch(e){ getMsgs().push({role:'error',content:e.message}); toast(e.message,'err'); }
          $(`#cs-${xid}-mc`).disabled=false; renderMcm();
        };
        $(`#cs-${xid}-mc`).onclick=send;
        $(`#ci-${xid}-mc`).onkeydown=e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} };
      }
    }
  ];
}

const pageComparison = {
  html: `
    <div class="page-header"><div class="page-title">🔀 Compare Providers</div><div class="page-sub">Send one message to multiple providers simultaneously — see responses side by side</div></div>
    <div class="card" style="margin-bottom:18px">
      <div class="inp-group"><label class="inp-label">Message (sent to all selected providers)</label>
        <textarea class="inp" id="cmp-msg" rows="3">Explain the concept of recursion with a simple example.</textarea></div>
      <div style="margin-bottom:14px">
        <div class="inp-label" style="margin-bottom:8px">Select Providers</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${[
            ['cmp-cl','🧠 Claude (Spring AI)',true],
            ['cmp-oa','🤖 OpenAI (Spring AI)',true],
            ['cmp-ms','🌊 Mistral (Spring AI)',false],
            ['cmp-loa','🤖 OpenAI (LC4j)',false],
            ['cmp-lcl','🧠 Claude (LC4j)',false],
            ['cmp-gem','💎 Gemini (LC4j)',false],
          ].map(([id,label,chk])=>`<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;background:var(--s2);border:1px solid var(--bd);padding:6px 12px;border-radius:6px"><input type="checkbox" id="${id}" ${chk?'checked':''}> ${label}</label>`).join('')}
        </div>
      </div>
      <button class="btn btn-primary" id="cmp-btn">⚡ Send to Selected Providers</button>
    </div>
    <div class="cmp-grid" id="cmp-results"></div>`,
  init() {
    $('#cmp-btn').onclick=async()=>{
      const msg=$('#cmp-msg').value.trim(); if(!msg){toast('Enter a message','err');return;}
      const btn=$('#cmp-btn'); btn.disabled=true; btn.textContent='Sending…';
      const grid=$('#cmp-results'); grid.innerHTML='';
      const providers=[
        {id:'cmp-cl',  name:'🧠 Claude',        badge:'b-orange', path:'/api/agent/chat',                   body:{message:msg}, key:'response'},
        {id:'cmp-oa',  name:'🤖 OpenAI (SAI)',   badge:'b-green',  path:'/api/springai/openai/chat',         body:{message:msg}, key:'response'},
        {id:'cmp-ms',  name:'🌊 Mistral (SAI)',  badge:'b-yellow', path:'/api/springai/mistral/chat',        body:{message:msg}, key:'response'},
        {id:'cmp-loa', name:'🤖 OpenAI (LC4j)', badge:'b-blue',   path:'/api/langchain4j/openai/chat',      body:{message:msg}, key:'response'},
        {id:'cmp-lcl', name:'🧠 Claude (LC4j)', badge:'b-orange', path:'/api/langchain4j/anthropic/chat',   body:{message:msg}, key:'response'},
        {id:'cmp-gem', name:'💎 Gemini',         badge:'b-blue',   path:'/api/langchain4j/gemini/chat',      body:{message:msg}, key:'response'},
      ].filter(p=>$('#'+p.id)&&$('#'+p.id).checked);

      if(!providers.length){toast('Select at least one provider','err');btn.disabled=false;btn.textContent='⚡ Send to Selected Providers';return;}

      // Create placeholder cards
      providers.forEach(p=>{
        const card=document.createElement('div');
        card.className='cmp-card'; card.id='cmp-c-'+p.id;
        card.innerHTML=`<div class="cmp-card-header">${p.name} <span class="badge ${p.badge}" style="margin-left:auto">waiting</span></div><div class="loading-row"><span class="spinner"></span> Sending…</div>`;
        grid.appendChild(card);
      });

      await Promise.all(providers.map(async p=>{
        const card=$('#cmp-c-'+p.id);
        try {
          const d=await apiPost(p.path,p.body);
          const resp=d[p.key]||d.response||JSON.stringify(d);
          const lib=d.library||''; const prov=d.provider||'';
          card.innerHTML=`<div class="cmp-card-header">${p.name} <span class="badge ${p.badge}" style="margin-left:auto">✓ done</span></div>
            ${lib?`<div style="font-size:11px;color:var(--t2);margin-bottom:6px">${lib}${prov?' · '+prov:''}</div>`:''}
            <div style="font-size:13px;line-height:1.6;color:var(--tx)">${esc(resp)}</div>
            <button class="icon-btn btn-sm" style="margin-top:8px" onclick="copyText(${JSON.stringify(resp)})">Copy</button>`;
        } catch(e){
          card.innerHTML=`<div class="cmp-card-header">${p.name} <span class="badge b-red" style="margin-left:auto">error</span></div><div style="color:var(--re);font-size:13px">${esc(e.message)}</div>`;
        }
      }));
      btn.disabled=false; btn.textContent='⚡ Send to Selected Providers';
    };
  }
};

          <div style="font-size:12px;color:var(--t2)">All 15 tool endpoints run inside the JVM: datetime, calculator, UUID, random, base64, word count, text transform, temperature converter, notes (CRUD), web search, directory list, system info.</div>
        </div>

  init() {
    if(!S.chats['fa-ol']) S.chats['fa-ol']=[];
    if(!S.chats['fa-lc']) S.chats['fa-lc']=[];

    // Tools wiring (same logic as pageTools)
    const show=(id,data)=>{const el=$('#'+id);el.style.display='block';el.innerHTML=`<pre>${esc(fmt(data))}</pre>`;};
    const go=(id,outId,fn)=>{ const b=$('#'+id); if(b) b.onclick=async()=>{try{const d=await fn();show(outId,d);}catch(e){toast(e.message,'err');}};};
    go('fa-dt','fa-dt-o',()=>apiGet('/api/tools/datetime'));
    go('fa-uu','fa-uu-o',()=>apiGet('/api/tools/uuid'));
    go('fa-si','fa-si-o',()=>apiGet('/api/tools/system-info'));
    go('fa-ca','fa-ca-o',()=>apiPost('/api/tools/calculate',{a:$('#fa-ca-a').value,operator:$('#fa-ca-op').value,b:$('#fa-ca-b').value}));
    go('fa-rn','fa-rn-o',()=>apiGet('/api/tools/random?min='+$('#fa-rn-mn').value+'&max='+$('#fa-rn-mx').value));

    go('fa-tt-up','fa-tt-o',()=>apiPost('/api/tools/text/transform',{text:$('#fa-tt-v').value,transformation:'upper'}));

    go('fa-wc','fa-wc-o',()=>apiPost('/api/tools/text/word-count',{text:$('#fa-wc-v').value}));
    go('fa-b6-en','fa-b6-o',()=>apiPost('/api/tools/base64/encode',{text:$('#fa-b6-v').value}));
    go('fa-b6-de','fa-b6-o',()=>apiPost('/api/tools/base64/decode',{encoded:$('#fa-b6-v').value}));
    go('fa-no-sv','fa-no-o',()=>apiPost('/api/tools/notes',{key:$('#fa-no-k').value,content:$('#fa-no-v').value}));
    go('fa-no-gt','fa-no-o',()=>apiGet('/api/tools/notes/'+$('#fa-no-k').value));
    go('fa-no-al','fa-no-o',()=>apiGet('/api/tools/notes'));
    go('fa-no-dl','fa-no-o',()=>apiDel('/api/tools/notes/'+$('#fa-no-k').value));
    go('fa-ws','fa-ws-o',()=>apiGet('/api/tools/search?query='+encodeURIComponent($('#fa-ws-q').value)));
    go('fa-dl','fa-dl-o',()=>apiGet('/api/tools/directory?path='+encodeURIComponent($('#fa-dl-p').value)));

    // Ollama Spring AI — chat
    const mkSend=(chatId,path,metaLib)=>{
      const btn=$('#cs-'+chatId), inp=$('#ci-'+chatId);
      if(!btn||!inp) return;
      const send=async()=>{
        const msg=inp.value.trim(); if(!msg) return;
        inp.value=''; btn.disabled=true;
        S.chats[chatId].push({role:'user',content:msg}); renderChat(chatId);
        try {
          const d=await apiPost(path,{message:msg});
          S.chats[chatId].push({role:'ai',content:d.response||JSON.stringify(d),meta:{library:metaLib,provider:'Ollama'}});
        } catch(e){ S.chats[chatId].push({role:'error',content:e.message}); toast(e.message,'err'); }
        btn.disabled=false; renderChat(chatId);
      };
      btn.onclick=send;
      inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
      renderChat(chatId);
    };
    mkSend('fa-ol','/api/springai/ollama/chat','Spring AI');
    mkSend('fa-lc','/api/langchain4j/ollama/chat','LangChain4j');

    // Stream — Ollama SAI
    setupStream('fa-ol-sb','fa-ol-sm','fa-ol-so','/api/springai/ollama/stream',m=>({message:m}));
    // Stream — Ollama LC4j
    setupStream('fa-lc-sb','fa-lc-sm','fa-lc-so','/api/langchain4j/ollama/stream',m=>({message:m}));

    // With system prompt — Ollama SAI
    $('#fa-ol-sb2').onclick=async()=>{
      const btn=$('#fa-ol-sb2'); btn.disabled=true;

      catch(e){toast(e.message,'err');} btn.disabled=false;

    // AiServices — Ollama LC4j
    $('#fa-lc-ab').onclick=async()=>{

      catch(e){toast(e.message,'err');} btn.disabled=false;
    };
  }
};

const PAGE_LABELS = {
  'dashboard':'Dashboard','free-apis':'🆓 No API Key Required','agent-chat':'Agent Chat','stream-chat':'Stream Chat',
  'structured':'Structured Output','templates':'Prompt Templates','vision':'Vision / Multimodal',

  'sai-mistral':'Spring AI — Mistral','lc4j-openai':'LC4j — OpenAI','lc4j-anthropic':'LC4j — Anthropic',

/* ── ROUTER ── */
function navigate(page) {
  const p = PAGES[page]; if(!p) return;
  S.page = page;
  // Update nav active state
  $$('.nav-item').forEach(el=>el.classList.toggle('active', el.dataset.page===page));
  // Update page title
  $('#page-title').textContent = PAGE_LABELS[page]||page;
  // Render
  const main=$('#main');
  main.innerHTML = p.html;
  if(p.init) p.init();
}

/* ── SIDEBAR ── */
let sbFilter = 'all'; // 'all' | 'free'

function navBadge(item) {
  if(item.free) return '<span class="nb nb-free">FREE</span>';
  if(item.key)  return `<span class="nb nb-key">${item.key}</span>`;
  return '';
}

function makeNavItem(item) {
  const el = document.createElement('div');
  el.className = 'nav-item';
  el.dataset.page = item.id;
  el.dataset.free = item.free ? '1' : '0';
  el.innerHTML = `<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis">${item.label}</span>${navBadge(item)}`;
  el.onclick = () => navigate(item.id);
  return el;
}

function buildSidebar() {
  const tree = $('#nav-tree'); tree.innerHTML = '';

  // Filter tab buttons
  const filters = document.createElement('div');
  filters.className = 'sb-filters';
  filters.innerHTML = `
    <button class="sb-ftab on" id="sf-all" onclick="setSbFilter('all')">All APIs</button>
    <button class="sb-ftab free" id="sf-free" onclick="setSbFilter('free')">🆓 Free Only</button>`;
  tree.appendChild(filters);

  NAV.forEach(entry => {
    if (entry.id) {
      tree.appendChild(makeNavItem(entry));
    } else if (entry.group) {
      const g = document.createElement('div'); g.className = 'nav-group';
      const lbl = document.createElement('div'); lbl.className = 'nav-group-label'; lbl.textContent = entry.group;
      g.appendChild(lbl);
      entry.items.forEach(item => g.appendChild(makeNavItem(item)));
      tree.appendChild(g);
    }
  });

  applySbFilter();
}

function setSbFilter(f) {
  sbFilter = f;
  $('#sf-all').classList.toggle('on', f === 'all');
  $('#sf-free').classList.toggle('on', f === 'free');
  applySbFilter();
}

function applySbFilter() {
  $$('.nav-item[data-free]').forEach(el => {
    const isFree = el.dataset.free === '1';
    el.style.display = (sbFilter === 'free' && !isFree) ? 'none' : '';
  });
  // Hide group labels when all their children are hidden
  $$('.nav-group').forEach(g => {
    const anyVisible = [...g.querySelectorAll('.nav-item')].some(i => i.style.display !== 'none');
    g.style.display = anyVisible ? '' : 'none';
  });
}

/* ── NAV SEARCH ── */
function setupNavSearch() {
  $('#nav-search').oninput = function() {
    const q = this.value.toLowerCase();
    $$('.nav-item[data-free]').forEach(el => {
      const isFree = el.dataset.free === '1';
      const textMatch = !q || el.textContent.toLowerCase().includes(q);
      const filterPass = sbFilter === 'all' || isFree;
      el.style.display = (textMatch && filterPass) ? '' : 'none';
    });
    $$('.nav-group').forEach(g => {
      const anyVisible = [...g.querySelectorAll('.nav-item')].some(i => i.style.display !== 'none');
      g.style.display = anyVisible ? '' : 'none';
    });
  };
}

/* ── THEME ── */
function applyTheme(t) {
  document.documentElement.dataset.theme=t;
  $('#theme-btn').textContent=t==='dark'?'☀️':'🌙';
  localStorage.setItem('th',t);
}

/* ── HEALTH CHECK ── */
function checkAppHealth() {
  const dot=$('#app-dot');
  const swLink=$('#swagger-link');
  dot.className='dot chk'; dot.title='Checking…';
  if(swLink) swLink.href = BASE + '/swagger-ui/index.html';
  const inp=$('#base-url-inp'); if(inp) inp.value=BASE;
  apiGet('/api/agent/ping')
    .then(()=>{
      dot.className='dot ok'; dot.title='Connected to '+BASE;
      // hide connection banner if shown
      const banner=$('#conn-banner'); if(banner) banner.remove();
    })
    .catch(e=>{
      dot.className='dot err'; dot.title='Cannot connect: '+e.message;
      // show a helpful banner if not already shown
      if(!$('#conn-banner')) {
        const b=document.createElement('div');
        b.id='conn-banner';
        b.style.cssText='background:rgba(248,81,73,.12);border-bottom:1px solid rgba(248,81,73,.3);padding:8px 16px;font-size:12px;color:var(--re);display:flex;align-items:center;gap:10px;flex-shrink:0';
        b.innerHTML='<strong>⚠ Cannot connect to backend</strong> — Make sure Spring Boot is running at <code style="background:rgba(0,0,0,.2);padding:1px 5px;border-radius:3px">'
          +BASE+'</code>. If you opened this file directly, click <strong>Connect</strong> above to set the correct URL.&nbsp;'
          +'<button onclick="checkAppHealth()" style="background:var(--re);color:#fff;border:none;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px">Retry</button>'
          +'<button onclick="this.parentElement.remove()" style="background:transparent;border:none;color:var(--re);cursor:pointer;margin-left:auto;font-size:16px">×</button>';
        // insert after header
        document.getElementById('app').insertBefore(b, document.getElementById('layout'));
      }
    });
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',()=>{
  applyTheme(S.theme);
  buildSidebar();
  setupNavSearch();
  navigate('dashboard');

  $('#sb-toggle').onclick=()=>$('#sidebar').classList.toggle('closed');
  $('#theme-btn').onclick=()=>applyTheme(S.theme==='dark'?'light':'dark');

  // Wire up base URL input — press Enter to connect
  const inp=$('#base-url-inp');
  if(inp) {
    inp.value = BASE;
    inp.onkeydown = e => { if(e.key==='Enter') setBase(inp.value); };
  }

  // Initial health check
  checkAppHealth();

  // Keyboard shortcut: / to focus search
  document.addEventListener('keydown',e=>{
    if(e.key==='/' && document.activeElement.tagName!=='TEXTAREA' && document.activeElement.tagName!=='INPUT'){
      e.preventDefault(); $('#nav-search').focus();
    }
  });
});
